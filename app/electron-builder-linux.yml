productName: "SiYuan"
appId: "org.b3log.siyuan"
asar: false
compression: "normal"
copyright: "© 2020-present Yunnan Liandi Technology Co., Ltd."
artifactName: "siyuan-${version}-${os}.${ext}"
extraMetadata:
  main: "electron/main.js"
directories:
  output: "build"
files:
  - "electron"
afterPack: "./scripts/afterPack.js"
extraFiles:
  - from: "../LICENSE"
    to: "LICENSE"

linux:
  icon: "src/assets/icon.icns"
  category: "Office"
  executableName: "siyuan"

  # Package metadata
  maintainer: "expoli <31023767+expoli@users.noreply.github.com>"
  homepage: "https://github.com/appdev/siyuan-unlock"
  synopsis: "Privacy-first personal knowledge management system"
  description: |
    SiYuan Note is a privacy-first personal knowledge management system with
    block-level references and Markdown WYSIWYG. This is the unlock version
    with additional features enabled.

    Features:
    - Block-level references and bidirectional links
    - Markdown WYSIWYG editing
    - Local-first with end-to-end encryption
    - Cross-platform support
    - Plugin and theme marketplace

  keywords: ["note-taking", "knowledge-management", "markdown", "productivity"]

  # Runtime dependencies (standard Electron dependencies)
  depends: [
    "libgtk-3-0 (>= 3.10)",
    "libnotify4 (>= 0.7)",
    "libnss3 (>= 3.26)",
    "libxss1",
    "libxtst6",
    "xdg-utils",
    "libatspi2.0-0 (>= 2.9.90)",
    "libuuid1",
    "libsecret-1-0",
    "libgbm1"
  ]

  # File associations and MIME types
  fileAssociations:
    - ext: "sy"
      name: "SiYuan Workspace"
      description: "SiYuan Note Workspace"
      mimeType: "application/x-siyuan-workspace"
      role: "Editor"

  mimeTypes:
    - "application/x-siyuan-workspace"

  desktop: {
    "Name": "SiYuan Note",
    "Comment": "Privacy-first personal knowledge management system",
    "GenericName": "Note Taking Application",
    "Type": "Application",
    "Categories": "Office;Utility;TextEditor;",
    "Keywords": "note;knowledge;markdown;productivity;writing;editor;",
    "StartupNotify": "true",
    "StartupWMClass": "siyuan",
    "DBusActivatable": "false",
    "Terminal": "false"
    entry: {
      Name: "SiYuan",
      Comment: "Refactor your thinking",
      Type: "Application",
      Categories: "Utility;"
    }
  }
  extraResources:
    - from: "kernel-linux"
      to: "kernel"
  target:
    - target: "tar.gz"
    - target: "AppImage"
    - target: "deb"

extraResources:
  - from: "changelogs"
    to: "changelogs"
  - from: "stage"
    to: "stage"
  - from: "guide"
    to: "guide"
    filter: "!**/{.DS_Store,.git,.gitignore,.idea}"
  - from: "appearance/boot"
    to: "appearance/boot"
    filter: "!**/{.DS_Store}"
  - from: "appearance/icons"
    to: "appearance/icons"
    filter: "!**/{.DS_Store}"
  - from: "appearance/langs"
    to: "appearance/langs"
    filter: "!**/{.DS_Store}"
  - from: "appearance/emojis"
    to: "appearance/emojis"
    filter: "!**/{.DS_Store}"
  - from: "appearance/themes/midnight"
    to: "appearance/themes/midnight"
    filter: "!**/{.DS_Store,custom.css}"
  - from: "appearance/themes/daylight"
    to: "appearance/themes/daylight"
    filter: "!**/{.DS_Store,custom.css}"
  - from: "appearance/fonts"
    to: "appearance/fonts"
    filter: "!**/{.DS_Store}"
  - from: "pandoc/pandoc-linux-amd64.zip"
    to: "pandoc.zip"
  - from: "pandoc/pandoc-resources"
    to: "pandoc-resources"
    filter: "!**/{.DS_Store}"
